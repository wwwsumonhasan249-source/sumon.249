<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>কুরআন ও হাদিস প্ল্যাটফর্ম</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0d1b2a, #1b2f3f);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }

        .header {
            text-align: center;
            background: rgba(255,255,255,0.04);
            padding: 18px 24px;
            border-radius: 20px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 28px;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: #888; font-size: 14px; margin-top: 4px; }

        .tab-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            justify-content: center;
        }
        .tab-btn {
            padding: 10px 24px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.04);
            color: #aaa;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }
        .tab-btn:hover { background: rgba(46,204,113,0.1); color: #2ecc71; }
        .tab-btn.active { background: #2ecc71; color: #000; border-color: #2ecc71; }

        .surah-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .surah-grid .surah-btn {
            padding: 10px 12px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.04);
            color: #ccc;
            cursor: pointer;
            font-size: 13px;
            transition: 0.3s;
            text-align: center;
        }
        .surah-grid .surah-btn:hover {
            background: rgba(46,204,113,0.15);
            color: #2ecc71;
            border-color: rgba(46,204,113,0.2);
            transform: translateY(-2px);
        }
        .surah-grid .surah-btn .ar {
            font-size: 16px;
            font-family: 'Amiri', 'Traditional Arabic', serif;
            display: block;
            color: #fff;
        }
        .surah-grid .surah-btn .bn {
            font-size: 12px;
            color: #888;
            display: block;
            margin-top: 2px;
        }

        .search-box {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 14px 18px;
            border: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 16px;
        }
        .search-box .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .search-box .input-group input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.04);
            color: white;
            font-size: 15px;
            outline: none;
            min-width: 150px;
        }
        .search-box .input-group input:focus { border-color: #2ecc71; }
        .search-box .input-group input::placeholder { color: #555; }
        .search-box .input-group button {
            background: #2ecc71;
            color: #000;
            border: none;
            padding: 9px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }
        .search-box .input-group button:hover { transform: scale(1.03); background: #27ae60; }

        .content-area {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.06);
            min-height: 200px;
        }
        .loading { text-align: center; padding: 30px; color: #666; display: none; }
        .loading.show { display: block; }
        .no-result { text-align: center; padding: 30px; color: #555; display: none; }
        .no-result.show { display: block; }
        .no-result .icon { font-size: 40px; margin-bottom: 8px; }

        .surah-view .surah-name {
            font-size: 24px;
            font-weight: 700;
            color: #2ecc71;
            margin-bottom: 4px;
        }
        .surah-view .surah-name .bn { color: #fff; }
        .surah-view .surah-info {
            font-size: 13px;
            color: #888;
            margin-bottom: 14px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .surah-view .surah-info span {
            background: rgba(255,255,255,0.04);
            padding: 2px 12px;
            border-radius: 30px;
        }
        .surah-view .ayah {
            padding: 10px 14px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 6px;
            border-right: 3px solid rgba(46,204,113,0.3);
        }
        .surah-view .ayah .arabic {
            font-size: 20px;
            font-family: 'Amiri', 'Traditional Arabic', serif;
            direction: rtl;
            text-align: right;
            color: #fff;
            line-height: 1.8;
        }
        .surah-view .ayah .translation {
            font-size: 14px;
            color: #bbb;
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px solid rgba(255,255,255,0.04);
        }
        .back-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            color: #aaa;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            margin-bottom: 14px;
            transition: 0.3s;
        }
        .back-btn:hover { background: rgba(46,204,113,0.15); color: #2ecc71; }

        .hadith-card {
            padding: 14px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            margin-bottom: 10px;
            border-left: 3px solid #2ecc71;
        }
        .hadith-card .h-narrator {
            font-size: 13px;
            color: #f1c40f;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .hadith-card .h-narrator .ra {
            color: #2ecc71;
            font-weight: 400;
        }
        .hadith-card .h-text {
            font-size: 14px;
            color: #ddd;
            line-height: 1.7;
        }
        .hadith-card .h-ref {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }

        .pagination {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 14px;
        }
        .pagination button {
            padding: 5px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.04);
            color: #aaa;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }
        .pagination button:hover { background: rgba(46,204,113,0.15); color: #2ecc71; }
        .pagination button.active { background: #2ecc71; color: #000; border-color: #2ecc71; }

        /* ===== ডেভেলপার বাটন ===== */
        .dev-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            color: white;
            font-size: 18px;
            cursor: pointer;
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .dev-btn:hover { background: rgba(46,204,113,0.25); }

        /* ===== ডেভেলপার মোডাল ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: #1a2a3a;
            border-radius: 24px;
            padding: 30px 24px 24px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .modal-box .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 12px;
            background: #2a3a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 3px solid #2ecc71;
        }
        .modal-box .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .modal-box h2 { font-size: 20px; margin-bottom: 2px; }
        .modal-box .role { color: #aaa; font-size: 13px; margin-bottom: 14px; }
        .modal-box .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            padding: 8px 14px;
            border-radius: 50px;
            margin-bottom: 6px;
            font-size: 13px;
            text-decoration: none;
            color: white;
            transition: 0.2s;
        }
        .modal-box .contact-item:hover { background: #2ecc71; color: #000; }
        .modal-close {
            background: #ff4444;
            border: none;
            color: white;
            padding: 8px 28px;
            border-radius: 50px;
            margin-top: 10px;
            cursor: pointer;
            font-size: 14px;
        }
        .modal-close:hover { background: #cc0000; }

        @media (max-width:600px) {
            .header h1 { font-size: 22px; }
            .tab-btn { padding: 8px 16px; font-size: 12px; }
            .surah-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
            .surah-grid .surah-btn { padding: 8px 10px; font-size: 12px; }
            .content-area { padding: 16px; }
            .surah-view .ayah .arabic { font-size: 17px; }
        }
    </style>
</head>

    </div>

        devModalClose.addEventListener('click', function() {
            devModal.classList.remove('show');
        });
        devModal.addEventListener('click', function(e) {
            if (e.target === devModal) {
                devModal.classList.remove('show');
            }
        });

        // ================================================================
        // ডেভেলপার তথ্য
        // ================================================================
        document.getElementById('devName').textContent = 'MD.sumon hasan';
        document.getElementById('devRole').textContent = '🛠️ web and apps developer 🛠️';
        document.getElementById('devWhatsApp').href = 'https://wa.me/8801960678584';
        document.getElementById('devEmail').href = 'mailto: sumonhasan249@gmail.com';
        document.getElementById('devPhone').href = 'tel:+8801960678584';
        document.getElementById('devPhone').textContent = '📞 Direct contact';

        // ================================================================
        // ট্যাব স্যুইচ
        // ================================================================
        tabs.forEach(function(tab) {
            tab.addEventListener('click', function() {
                tabs.forEach(function(t) { t.classList.remove('active'); });
                this.classList.add('active');
                currentTab = this.getAttribute('data-tab');
                viewMode = 'grid';
                currentPage = 1;
                resultContainer.innerHTML = '';
                noResult.classList.remove('show');
                pagination.innerHTML = '';

                if (currentTab === 'quran') {
                    showSurahGrid();
                } else {
                    searchInput.value = '';
                    loadHadithCollection(currentTab);
                }
            });
        });

        // ================================================================
        // 🏠 সূরা গ্রিড
        // ================================================================
        function showSurahGrid() {
            var html = '<div class="surah-grid">';
            for (var i = 0; i < SURAH_NAMES.length; i++) {
                var s = SURAH_NAMES[i];
                html += '<button class="surah-btn" data-surah="' + s.num + '">';
                html += '<span class="ar">' + s.ar + '</span>';
                html += '<span class="bn">' + s.num + '. ' + s.bn + '</span>';
                html += '</button>';
            }
            html += '</div>';
            resultContainer.innerHTML = html;
            noResult.classList.remove('show');
            pagination.innerHTML = '';

            document.querySelectorAll('.surah-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var surahNum = parseInt(this.getAttribute('data-surah'));
                    loadSurah(surahNum);
                });
            });
        }

        // ================================================================
        // 📖 সূরা লোড
        // ================================================================
        function loadSurah(surahNum) {
            showLoading();
            viewMode = 'surah';

            var url = QURAN_API + '/surah/' + surahNum + '/bn.bengali';
            var urlAr = QURAN_API + '/surah/' + surahNum + '/quran-uthmani';

            Promise.all([
                fetch(url).then(function(r) { return r.json(); }),
                fetch(urlAr).then(function(r) { return r.json(); })
            ])
            .then(function(results) {
                hideLoading();
                var dataBn = results[0];
                var dataAr = results[1];

                if (dataBn.code !== 200 || dataAr.code !== 200) {
                    showNoResult('সূরাটি লোড করা সম্ভব হয়নি।');
                    return;
                }

                var surahBn = dataBn.data;
                var surahAr = dataAr.data;

                var html = '<button class="back-btn" id="backToGridBtn">⬅️ সূরা তালিকায় ফিরুন</button>';
                html += '<div class="surah-view">';
                html += '<div class="surah-name">' + surahAr.name + ' <span class="bn">(' + surahBn.name + ')</span></div>';
                html += '<div class="surah-info"><span>📖 ' + surahBn.englishName + '</span><span>📜 ' + surahBn.ayahs.length + ' আয়াত</span></div>';

                for (var i = 0; i < surahBn.ayahs.length; i++) {
                    var ayahBn = surahBn.ayahs[i];
                    var ayahAr = surahAr.ayahs[i];
                    html += '<div class="ayah">';
                    html += '<div class="arabic">' + ayahAr.text + '</div>';
                    html += '<div class="translation"><span style="color:#888;font-size:12px;">' + ayahBn.numberInSurah + '.</span> ' + ayahBn.text + '</div>';
                    html += '</div>';
                }

                html += '</div>';
                resultContainer.innerHTML = html;
                noResult.classList.remove('show');
                pagination.innerHTML = '';

                document.getElementById('backToGridBtn').addEventListener('click', function() {
                    viewMode = 'grid';
                    showSurahGrid();
                });
            })
            .catch(function(err) {
                hideLoading();
                showNoResult('এরর: ' + err.message);
            });
        }

        // ================================================================
        // 📚 হাদিস সংগ্রহ লোড (স্থানীয় ডেটা)
        // ================================================================
        function loadHadithCollection(collection) {
            var hadiths = HADITH_DATA[collection];
            if (!hadiths || hadiths.length === 0) {
                showNoResult('এই সংগ্রহে কোনো হাদিস পাওয়া যায়নি।');
                return;
            }

            var results = hadiths.map(function(item, index) {
                item._id = index + 1;
                return item;
            });

            currentResults = results;
            renderHadithResults(results);
        }

        // ================================================================
        // 🔍 হাদিস সার্চ (স্থানীয় ডেটায়)
        // ================================================================
        function searchHadith(query, collection) {
            var hadiths = HADITH_DATA[collection];
            if (!hadiths || hadiths.length === 0) {
                showNoResult('এই সংগ্রহে কোনো হাদিস পাওয়া যায়নি।');
                return;
            }

            var lowerQuery = query.toLowerCase();
            var results = [];

            for (var i = 0; i < hadiths.length; i++) {
                var item = hadiths[i];
                var text = (item.text || '').toLowerCase();
                var narrator = (item.narrator || '').toLowerCase();
                if (text.includes(lowerQuery) || narrator.includes(lowerQuery)) {
                    item._id = i + 1;
                    results.push(item);
                }
            }

            if (results.length === 0) {
                showNoResult('"' + query + '" সম্পর্কে কোনো হাদিস পাওয়া যায়নি।');
                return;
            }

            currentResults = results;
            renderHadithResults(results);
        }

        // ================================================================
        // 📋 হাদিস রেন্ডার
        // ================================================================function renderHadithResults(results) {
            var totalPages = Math.ceil(results.length / itemsPerPage);
            if (currentPage > totalPages) currentPage = 1;

            var start = (currentPage - 1) * itemsPerPage;
            var end = Math.min(start + itemsPerPage, results.length);
            var pageItems = results.slice(start, end);

            var html = '';
            for (var i = 0; i < pageItems.length; i++) {
                var item = pageItems[i];
                html += '<div class="hadith-card">';
                if (item.narrator) {
                    html += '<div class="h-narrator">📜 বর্ণনাকারী: ' + item.narrator + ' <span class="ra">(রাদিয়াল্লাহু তা‘আলা আনহু)</span></div>';
                }
                html += '<div class="h-text">' + item.text + '</div>';
                if (item.ref) {
                    html += '<div class="h-ref">📌 ' + item.ref + '</div>';
                }
                html += '</div>';
            }

            resultContainer.innerHTML = html;
            noResult.classList.remove('show');
            renderPagination(totalPages);
        }

        // ================================================================
        // 📄 পেজিনেশন
        // ================================================================
        function renderPagination(totalPages) {
            pagination.innerHTML = '';
            if (totalPages <= 1) return;

            for (var i = 1; i <= Math.min(totalPages, 20); i++) {
                var btn = document.createElement('button');
                btn.textContent = i;
                if (i === currentPage) btn.classList.add('active');
                btn.addEventListener('click', function() {
                    currentPage = parseInt(this.textContent);
                    renderHadithResults(currentResults);
                });
                pagination.appendChild(btn);
            }
        }

        // ================================================================
        // UI হেল্পার
        // ================================================================
        function showLoading() {
            loading.classList.add('show');
            resultContainer.innerHTML = '';
            noResult.classList.remove('show');
            pagination.innerHTML = '';
        }

        function hideLoading() {
            loading.classList.remove('show');
        }

        function showNoResult(msg) {
            hideLoading();
            resultContainer.innerHTML = '';
            noResult.classList.add('show');
            noResult.querySelector('p').textContent = msg || 'কোনো ফলাফল পাওয়া যায়নি।';
            pagination.innerHTML = '';
        }

        // ================================================================
        // 🔍 সার্চ হ্যান্ডলার
        // ================================================================
        function performSearch() {
            var query = searchInput.value.trim().toLowerCase();
            if (!query) {
                if (currentTab === 'quran') {
                    showSurahGrid();
                } else {
                    loadHadithCollection(currentTab);
                }
                return;
            }

            if (currentTab === 'quran') {
                var found = null;
                for (var i = 0; i < SURAH_NAMES.length; i++) {
                    var s = SURAH_NAMES[i];
                    if (s.bn.toLowerCase() === query || s.bn.toLowerCase().includes(query) || s.ar.includes(query)) {
                        found = s;
                        break;
                    }
                }
                if (found) {
                    loadSurah(found.num);
                } else {
                    showNoResult('"' + query + '" নামে কোনো সূরা পাওয়া যায়নি।');
                }
            } else {
                searchHadith(query, currentTab);
            }
        }

        // ================================================================
        // ইভেন্ট
        // ================================================================
        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') performSearch();
        });

        // ================================================================
        // ডিফল্ট লোড
        // ================================================================
        window.onload = function() {
            showSurahGrid();
        };
    </script>

</body>
</html>
