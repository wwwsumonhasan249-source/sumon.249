<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>সার্চ ইঞ্জিন</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background: #0f0f0f;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 999;
            background: #0f0f0f;
            padding: 12px 20px 10px;
            border-bottom: 1px solid #2a2a2a;
        }
        .container { max-width: 1200px; margin: 0 auto; width: 100%; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 8px;
        }
        .header h1 { font-size: 22px; }
        .dev-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #2a2a2a;
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }
        .dev-btn:hover { background: #3b82f6; }
        .banner-area {
            width: 100%;
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 10px;
            background: #1a1a2e;
            min-height: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .banner-area img {
            width: 100%;
            max-height: 180px;
            object-fit: cover;
            display: block;
        }
        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 5px 14px;
            border-radius: 30px;
            cursor: pointer;
            background: #272727;
            border: none;
            color: white;
            font-size: 13px;
        }
        .tab.active { background: #1a73e8; }
        .search-area {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .search-area input {
            flex: 3;
            min-width: 140px;
            padding: 8px 14px;
            border-radius: 50px;
            border: none;
            font-size: 14px;
            background: #272727;
            color: white;
        }
        .search-area input::placeholder { color: #888; }
        .search-area button {
            padding: 8px 18px;
            border-radius: 50px;
            border: none;
            font-size: 14px;
            background: #1a73e8;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .search-area button:hover { background: #1557b0; }
        #resultsContainer {
            max-height: 260px;
            overflow-y: auto;
            margin-bottom: 8px;
            background: #1a1a2e;
            border-radius: 12px;
            padding: 6px;
        }
        #resultsContainer::-webkit-scrollbar { width: 4px; }
        #resultsContainer::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .result-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 1px solid #2a2a2a;
        }
        .result-item:hover { background: #2a2a2a; }
        .result-item .icon { font-size: 16px; width: 26px; text-align: center; }
        .result-item .info { flex: 1; overflow: hidden; }
        .result-item .info .title {
            font-size: 13px;
            color: #1a73e8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .result-item .info .url {
            font-size: 10px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .result-item .load-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 10px;
            cursor: pointer;
        }
        .result-item .load-btn:hover { background: #2563eb; }
        .loading { color: #aaa; text-align: center; padding: 16px; font-size: 13px; }
        .no-result { color: #aaa; text-align: center; padding: 16px; font-size: 13px; }
        .viewer-wrapper {
            flex: 1;
            background: #ffffff;
            border-radius: 16px 16px 0 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 300px;
            position: relative;
        }
        .viewer-wrapper .viewer-header {
            background: #1e1e1e;
            padding: 6px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        .viewer-wrapper .viewer-header .url-display {
            color: #aaa;
            font-size: 11px;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 8px;
        }
        .viewer-wrapper .viewer-header .close-viewer {
            background: #ff4444;
            border: none;
            color: white;
            padding: 3px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
        }
        .viewer-wrapper .viewer-header .close-viewer:hover { background: #cc0000; }
        .viewer-wrapper iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: white;
        }
        .viewer-placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 16px;
            background: #1a1a2e;
            flex-direction: column;
            gap: 8px;
        }
        .viewer-placeholder .big-icon { font-size: 40px; }
        .error-box {
            flex: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            color: #ff6b6b;
            padding: 30px;
            text-align: center;
        }
        .error-box .error-icon { font-size: 48px; margin-bottom: 12px; }
        .error-box .error-title { font-size: 18px; color: white; margin-bottom: 6px; }
        .error-box .error-msg { font-size: 13px; color: #aaa; margin-bottom: 16px; }
        .error-box .error-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            margin: 4px;
        }
        .error-box .error-btn:hover { background: #2563eb; }
        .error-box .error-btn.green { background: #22c55e; }
        .error-box .error-btn.green:hover { background: #16a34a; }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: #1e1e1e;
            border-radius: 24px;
            padding: 30px 24px 24px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            border: 1px solid #333;
        }
        .modal-box .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 12px;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #888;
            border: 3px solid #3b82f6;
            overflow: hidden;
        }
        .modal-box .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .modal-box .avatar .no-photo { font-size: 40px; }
        .modal-box h2 { font-size: 20px; margin-bottom: 2px; }
        .modal-box .role { color: #aaa; font-size: 13px; margin-bottom: 14px; }
        .modal-box .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #2a2a2a;
            padding: 8px 14px;
            border-radius: 50px;
            margin-bottom: 6px;
            font-size: 13px;
            text-decoration: none;
            color: white;
            transition: 0.2s;
        }
        .modal-box .contact-item:hover { background: #3b82f6; }
        .modal-close {
            background: #ff4444;
            border: none;
            color: white;
            padding: 8px 28px;
            border-radius: 50px;
            margin-top: 10px;
            cursor: pointer;
            font-size: 14px;
        }
        .modal-close:hover { background: #cc0000; }
        @media (max-width:600px) {
            .sticky-header { padding: 8px 10px; }
            .header h1 { font-size: 18px; }
            .search-area input { min-width: 100px; font-size: 13px; }
            .result-item .info .title { font-size: 12px; }
            .viewer-wrapper { min-height: 200px; }
            #resultsContainer { max-height: 180px; }
            .modal-box .avatar { width: 80px; height: 80px; font-size: 32px; }
        }
    </style>
</head>
<body>

    <div class="sticky-header">
        <div class="container">
            <div class="header">
                <h1>🔍 সার্চ ইঞ্জিন</h1>
                <button class="dev-btn" id="devInfoBtn">👤</button>
            </div>
            <div class="banner-area" id="bannerArea">
                <img id="bannerImage" style="display:none;" alt="ব্যানার" />
            </div>
            <div class="tab-bar">
                <button class="tab active" data-tab="web">🌐 ওয়েব</button>
                <button class="tab" data-tab="video">🎬 ভিডিও</button>
            </div>
            <div class="search-area">
                <input type="text" id="searchInput" placeholder="যা খুঁজতে চান লিখুন..." />
                <button id="searchBtn">🔍 সার্চ</button>
            </div>
            <div id="resultsContainer"></div>
        </div>
    </div>

    <div class="viewer-wrapper" id="viewerWrapper">
        <div class="viewer-header" id="viewerHeader" style="display:none;">
            <span class="url-display" id="currentUrlDisplay">https://example.com</span>
            <button class="close-viewer" id="closeViewerBtn">✕ বন্ধ</button>
        </div>
        <div class="viewer-placeholder" id="viewerPlaceholder">
            <div class="big-icon">🌐</div>
            <div>সার্চ করে যেকোনো লিংকে ক্লিক করুন</div>
        </div>
        <div class="error-box" id="errorBox">
            <div class="error-icon">🚫</div>
            <div class="error-title">ওয়েবসাইট লোড করা সম্ভব নয়</div>
            <div class="error-msg" id="errorMsg">এই ওয়েবসাইটটি iframe-এ লোড হতে বাধা দেয়।</div>
            <div>
                <button class="error-btn green" id="openNewTabBtn">🔗 নতুন ট্যাবে খুলুন</button>
                <button class="error-btn" id="errorCloseBtn">✕ বন্ধ করুন</button>
            </div>
        </div>
        <iframe id="viewerIframe" style="display:none; flex:1; width:100%; border:none; background:white;"></iframe>
    </div>

    <div class="modal-overlay" id="devModal">
        <div class="modal-box">
            <div class="avatar" id="avatarContainer">
                <img id="devPhoto" style="display:none;" alt="প্রোফাইল" />
                <span class="no-photo" id="noPhotoPlaceholder">👤</span>
            </div>
            <h2 id="devName">আপনার নাম</h2>
            <p class="role" id="devRole">🛠️ ওয়েব ডেভেলপার</p>
            <a id="devWhatsApp" href="#" target="_blank" class="contact-item">💬 হোয়াটসঅ্যাপে মেসেজ</a>
            <a id="devEmail" href="#" class="contact-item">📧 ইমেইল পাঠান</a>
            <a id="devPhone" href="#" class="contact-item">📞 কল করুন</a>
            <button class="modal-close" id="devModalClose">✕ বন্ধ</button>
        </div>
    </div>

    <script>
        // ================================================================
        // ফাইল পাথ
        // ================================================================
        var BANNER_PATH = 'banner-photo.jpg';
        var PROFILE_PATH = 'profile-photo.jpg';

        // ================================================================
        // ডেভেলপার তথ্য
        // ================================================================
        var DEV_INFO = {
            name: 'আপনার নাম',
            role: '🛠️ ওয়েব ডেভেলপার',
            whatsapp: 'https://wa.me/88017XXXXXXXX',
            email: 'mailto:yourmail@example.com',
            phone: 'tel:+88017XXXXXXXX',
            phoneDisplay: '+৮৮০ ১৭০০-XXXXXXX'
        };

        // ================================================================
        // ডম এলিমেন্ট
        // ================================================================
        var searchInput = document.getElementById('searchInput');
        var searchBtn = document.getElementById('searchBtn');
        var resultsDiv = document.getElementById('resultsContainer');
        var viewerIframe = document.getElementById('viewerIframe');
        var viewerPlaceholder = document.getElementById('viewerPlaceholder');
        var viewerHeader = document.getElementById('viewerHeader');
        var currentUrlDisplay = document.getElementById('currentUrlDisplay');
        var closeViewerBtn = document.getElementById('closeViewerBtn');
        var errorBox = document.getElementById('errorBox');
        var errorMsg = document.getElementById('errorMsg');
        var openNewTabBtn = document.getElementById('openNewTabBtn');
        var errorCloseBtn = document.getElementById('errorCloseBtn');
        var tabs = document.querySelectorAll('.tab');
        var devBtn = document.getElementById('devInfoBtn');
        var devModal = document.getElementById('devModal');
        var devModalClose = document.getElementById('devModalClose');
        var bannerImage = document.getElementById('bannerImage');
        var devPhoto = document.getElementById('devPhoto');
        var noPhotoPlaceholder = document.getElementById('noPhotoPlaceholder');
        var currentTab = 'web';
        var currentUrl = '';

        // ================================================================
        // ব্যানার লোড
        // ================================================================
        function loadBanner() {
            bannerImage.src = BANNER_PATH;
            bannerImage.onload = function() {
                bannerImage.style.display = 'block';
            };
            bannerImage.onerror = function() {
                bannerImage.style.display = 'none';
            };
        }
        loadBanner();

        // ================================================================
        // প্রোফাইল ফটো লোড
        // ================================================================
        function loadProfilePhoto() {
            devPhoto.src = PROFILE_PATH;
            devPhoto.onload = function() {
                devPhoto.style.display = 'block';
                noPhotoPlaceholder.style.display = 'none';
            };
            devPhoto.onerror = function() {
                devPhoto.style.display = 'none';
                noPhotoPlaceholder.style.display = 'block';
            };
        }
        loadProfilePhoto();

        // ================================================================
        // ডেভেলপার তথ্য সেট
        // ================================================================
        document.getElementById('devName').textContent = DEV_INFO.name;
        document.getElementById('devRole').textContent = DEV_INFO.role;
        document.getElementById('devWhatsApp').href = DEV_INFO.whatsapp;
        document.getElementById('devEmail').href = DEV_INFO.email;
        document.getElementById('devPhone').href = DEV_INFO.phone;
        document.getElementById('devPhone').textContent = '📞 ' + DEV_INFO.phoneDisplay;

        // ================================================================
        // ভিউয়ার কন্ট্রোল
        // ================================================================
        function showError(message, url) {
            errorBox.style.display = 'flex';
            viewerIframe.style.display = 'none';
            viewerPlaceholder.style.display = 'none';
            viewerHeader.style.display = 'flex';
            currentUrlDisplay.textContent = url || 'লোড করা সম্ভব নয়';
            errorMsg.textContent = message || 'এই ওয়েবসাইটটি iframe-এ লোড হতে বাধা দেয়।';
            currentUrl = url;
        }

        function hideError() {
            errorBox.style.display = 'none';
        }

        function loadUrlInViewer(url, title) {
            if (!url || url === '#' || url === '') {
                return;
            }
            
            // ভিডিও ডিটেক্ট
            var videoId = null;
            if (url.includes('youtube.com/watch?v=')) {
                try {
                    var urlParams = new URLSearchParams(new URL(url).search);
                    videoId = urlParams.get('v');
                } catch(e) {}
            } else if (url.includes('youtu.be/')) {
                try {
                    var parts = url.split('/');
                    videoId = parts[parts.length - 1].split('?')[0];
                } catch(e) {}
            }

            // ভিডিও হলে প্লেয়ার দেখাই
            if (videoId) {
                hideError();
                viewerIframe.style.display = 'block';
                viewerPlaceholder.style.display = 'none';
                viewerHeader.style.display = 'flex';
                currentUrlDisplay.textContent = '▶️ ' + (title || 'ভিডিও');
                viewerIframe.src = 'https://www.youtube.com/embed/' + videoId + '?autoplay=1&rel=0';
                return;
            }

            // সাধারণ ওয়েবসাইট
            try {
                var finalUrl = url;
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    finalUrl = 'https://' + url;
                }
                
                // iframe-এ লোড করার চেষ্টা
                hideError();
                viewerIframe.style.display = 'block';
                viewerPlaceholder.style.display = 'none';
                viewerHeader.style.display = 'flex';
                currentUrlDisplay.textContent = finalUrl;
                viewerIframe.src = finalUrl;
                
                // যদি iframe লোড না হয় (এরর দেখায়)
                viewerIframe.onerror = function() {
                    showError('এই ওয়েবসাইটটি iframe-এ লোড হতে বাধা দেয়।', finalUrl);
                };
                
                // 5 সেকেন্ড পর চেক করি (যদি লোড না হয়)
                setTimeout(function() {
                    try {
                        // iframe-এর কন্টেন্ট চেক করা যায় না (CORS কারণে)
                        // তাই আমরা ধরে নিই সঠিকভাবে লোড হয়েছে
                    } catch(e) {
                        showError('এই ওয়েবসাইটটি লোড করা সম্ভব নয়।', finalUrl);
                    }
                }, 3000);
                
            } catch(e) {
                showError('এই লিংকটি লোড করা সম্ভব নয়: ' + e.message, url);
            }
        }

        function closeViewer() {
            viewerIframe.style.display = 'none';
            viewerPlaceholder.style.display = 'flex';
            viewerHeader.style.display = 'none';
            viewerIframe.src = '';
            hideError();
        }

        // ================================================================
        // ভিউয়ার ইভেন্ট
        // ================================================================
        closeViewerBtn.addEventListener('click', closeViewer);

        openNewTabBtn.addEventListener('click', function() {
            if (currentUrl) {
                window.open(currentUrl, '_blank');
            }
        });

        errorCloseBtn.addEventListener('click', closeViewer);

        // ================================================================
        // ট্যাব স্যুইচ
        // ================================================================
        for (var i = 0; i < tabs.length; i++) {
            tabs[i].addEventListener('click', function() {
                for (var j = 0; j < tabs.length; j++) {
                    tabs[j].classList.remove('active');
                }
                this.classList.add('active');
                currentTab = this.getAttribute('data-tab');
                resultsDiv.innerHTML = '';
                closeViewer();
                if (searchInput.value.trim()) {
                    performSearch();
                }
            });
        }

        // ================================================================
        // ডেভেলপার মোডাল
        // ================================================================
        devBtn.addEventListener('click', function() {
            loadProfilePhoto();
            devModal.classList.add('show');
        });
        devModalClose.addEventListener('click', function() {
            devModal.classList.remove('show');
        });
        devModal.addEventListener('click', function(e) {
            if (e.target === devModal) {
                devModal.classList.remove('show');
            }
        });

        // ================================================================
        // সার্চ ফাংশন (DuckDuckGo)
        // ================================================================
        function performSearch() {
            var query = searchInput.value.trim();
            if (!query) {
                resultsDiv.innerHTML = '<div class="no-result">⚠️ দয়া করে কিছু লিখুন</div>';
                return;
            }

            resultsDiv.innerHTML = '<div class="loading">⏳ লোড হচ্ছে...</div>';
            closeViewer();

            var url = 'https://api.duckduckgo.com/?q=' + encodeURIComponent(query) + '&format=json&no_html=1&skip_disambig=1';
            fetch(url)
                .then(function(res) {
                    if (!res.ok) {
                        throw new Error('HTTP ' + res.status);
                    }
                    return res.json();
                })
                .then(function(data) {
                    var results = [];
                    if (data.RelatedTopics && data.RelatedTopics.length > 0) {
                        for (var i = 0; i < data.RelatedTopics.length; i++) {
                            var item = data.RelatedTopics[i];
                            if (item.Text && item.FirstURL) {
                                var title = item.Text;
                                var snippet = '';
                                if (item.Text.includes(' - ')) {
                                    var parts = item.Text.split(' - ');
                                    title = parts[0];
                                    snippet = parts.slice(1).join(' - ');
                                }
                                results.push({
                                    title: title || item.Text,
                                    url: item.FirstURL || '#',
                                    content: snippet || item.Text,
                                    icon: '🌐'
                                });
                            }
                        }
                    }
                    if (data.AbstractText) {
                        results.unshift({
                            title: data.Heading || data.Abstract || 'উত্তর',
                            url: data.AbstractURL || '#',
                            content: data.AbstractText,
                            icon: '📄'
                        });
                    }
                    if (results.length === 0) {
                        resultsDiv.innerHTML = '<div class="no-result">😕 কোনো রেজাল্ট পাওয়া যায়নি</div>';
                        return;
                    }

                    // ভিডিও ট্যাব হলে YouTube লিংক ফিল্টার
                    if (currentTab === 'video') {
                        var videoResults = [];
                        for (var i = 0; i < results.length; i++) {
                            var item = results[i];
                            if (item.url && (item.url.includes('youtube.com') || item.url.includes('youtu.be') || item.url.includes('vimeo.com'))) {
                                videoResults.push(item);
                            }
                        }
                        if (videoResults.length === 0) {
                            resultsDiv.innerHTML = '<div class="no-result">😕 কোনো ভিডিও পাওয়া যায়নি</div>';
                            return;
                        }
                        renderResults(videoResults);
                    } else {
                        renderResults(results);
                    }
                })
                .catch(function(err) {
                    console.error('সার্চ এরর:', err);
                    resultsDiv.innerHTML = '<div class="no-result">❌ সার্চ ইঞ্জিন সাড়া দিচ্ছে না। <button onclick="performSearch()" style="background:#3b82f6;color:white;border:none;padding:4px 14px;border-radius:30px;cursor:pointer;">আবার চেষ্টা</button></div>';
                });
        }

        // ================================================================
        // রেজাল্ট রেন্ডার
        // ================================================================
        function renderResults(results) {
            resultsDiv.innerHTML = '';
            var maxResults = Math.min(results.length, 20);
            for (var i = 0; i < maxResults; i++) {
                var item = results[i];
                var div = document.createElement('div');
                div.className = 'result-item';
                var icon = item.icon || '🌐';
                div.innerHTML = '<span class="icon">' + icon + '</span>' +
                    '<div class="info">' +
                        '<div class="title">' + (item.title || 'শিরোনাম নেই') + '</div>' +
                        '<div class="url">' + (item.url || '') + '</div>' +
                    '</div>' +
                    '<button class="load-btn" data-url="' + item.url + '" data-title="' + item.title + '">▶ ওপেন</button>';
                var loadBtn = div.querySelector('.load-btn');
                loadBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var url = this.getAttribute('data-url');
                    var title = this.getAttribute('data-title');
                    loadUrlInViewer(url, title);
                });
                div.addEventListener('click', function() {
                    var url = this.querySelector('.load-btn').getAttribute('data-url');
                    var title = this.querySelector('.load-btn').getAttribute('data-title');
                    loadUrlInViewer(url, title);
                });
                resultsDiv.appendChild(div);
            }
        }

        // ================================================================
        // ইভেন্ট লিসেনার
        // ================================================================
        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        // ================================================================
        // ডিফল্ট সার্চ
        // ================================================================
        window.onload = function() {
            setTimeout(function() {
                searchInput.value = 'Song';
                performSearch();
            }, 500);
        };
    </script>

</body>
</html>
